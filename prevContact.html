<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us - My Learning Hub</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f2f2f2;
        }

        header {
            background-color: darkolivegreen;
            color: white;
            padding: 40px 0;
            text-align: center;
        }

        nav {
            background-color: #111827;
            padding: 12px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 4px;
            transition: 0.3s;
        }

        nav a:hover {
            background-color: darkgreen;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            padding: 30px;
            max-width: 1000px;
            margin: auto;
        }

        .box {
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            border-top: 5px solid darkolivegreen;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        label {
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        input[type="submit"] {
            background-color: darkolivegreen;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        input[type="submit"]:hover {
            background-color: darkgreen;
        }

        .error {
            color: red;
            font-size: 13px;
            margin-top: -10px;
            margin-bottom: 10px;
        }

        #map {
            height: 400px;
            border-radius: 10px;
        }

        footer {
            background-color: darkolivegreen;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }

        @media (max-width: 768px) {
            .row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<header>
    <h1>Contact Us</h1>
    <p>We would love to hear from you</p>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="#">Courses</a>
    <a href="#">About</a>
    <a href="contact.html">Contact</a>
    <a href="login.html">Login</a>
</nav>

<div class="row">

    <!-- Contact Form -->
    <div class="box">
        <h2>Get in Touch</h2>

        <form id="contactForm">

            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter your name">
            <div class="error" id="nameError"></div>

            <label>Email</label>
            <input type="text" id="email" placeholder="Enter your email">
            <div class="error" id="emailError"></div>

            <label>Phone Number</label>
            <input type="text" id="phone" placeholder="Enter phone number">
            <div class="error" id="phoneError"></div>

            <label>Subject</label>
            <input type="text" id="subject" placeholder="Enter subject">
            <div class="error" id="subjectError"></div>

            <label>Message</label>
            <textarea rows="5" id="message" placeholder="Write message"></textarea>
            <div class="error" id="messageError"></div>

            <input type="submit" value="Send Message">

        </form>
    </div>

    <!-- Map Section -->
    <div class="box">
        <h2>Our Location</h2>
        <div id="map"></div>

        <hr><br>

        <p><b>Address:</b><br>
        K J Somaiya College<br>
        Vidyavihar, Mumbai, India</p>
    </div>

</div>

<footer>
    <p>© 2026 My Learning Hub</p>
</footer>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    // ===== LEAFLET MAP =====
    var map = L.map('map').setView([19.0760, 72.8995], 16);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    L.marker([19.0760, 72.8995])
        .addTo(map)
        .bindPopup("<b>K J Somaiya College</b><br>Vidyavihar, Mumbai, India")
        .openPopup();


    // ===== VALIDATION FUNCTION =====
    function showError(input, message) {
        input.style.border = "2px solid red";
        input.nextElementSibling.innerText = message;
    }

    function clearError(input) {
        input.style.border = "1px solid #ccc";
        input.nextElementSibling.innerText = "";
    }

    function validateField(input) {
        var value = input.value.trim();

        if (input.id === "name") {
            var pattern = /^[A-Za-z ]{3,}$/;
            if (!pattern.test(value)) {
                showError(input, "Name must be at least 3 letters and only alphabets.");
                return false;
            }
        }

        if (input.id === "email") {
            var pattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
            if (!pattern.test(value)) {
                showError(input, "Enter a valid email address.");
                return false;
            }
        }

        if (input.id === "phone") {
            var pattern = /^[0-9]{10}$/;
            if (!pattern.test(value)) {
                showError(input, "Phone number must be exactly 10 digits.");
                return false;
            }
        }

        /* ===== CHANGED HERE ===== */
        if (input.id === "subject") {
            if (value.length < 10) {
                showError(input, "Subject must be at least 10 characters.");
                return false;
            }
        }
        /* ========================= */

        if (input.id === "message") {
            if (value.length < 10) {
                showError(input, "Message must be at least 10 characters.");
                return false;
            }
        }

        clearError(input);
        return true;
    }

    // ===== BLUR EVENT FOR ALL FIELDS =====
    var fields = document.querySelectorAll("#contactForm input, #contactForm textarea");

    fields.forEach(function(field) {
        field.addEventListener("blur", function() {
            validateField(field);
        });
    });

    document.getElementById("contactForm").addEventListener("submit", function(e) {

        var isValid = true;

        fields.forEach(function(field) {
            if (!validateField(field)) {
                isValid = false;
            }
        });

        if (!isValid) {
            e.preventDefault();
        } else {
            alert("Form submitted successfully!");
        }
    });

</script>

</body>
</html>

</html>
