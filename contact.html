<div class="row">

<div class="box">
<h2>Get in Touch</h2>

<form id="contactForm">

<label>Full Name</label>
<input type="text" id="contactName" placeholder="Enter your full name">
<small id="nameError" style="color:red;"></small>

<label>Email</label>
<input type="email" id="contactEmail" placeholder="example@gmail.com">
<small id="emailError" style="color:red;"></small>

<label>Phone</label>
<input type="tel" id="contactPhone" placeholder="Enter 10 digit phone number">
<small id="phoneError" style="color:red;"></small>

<label>Subject</label>
<input type="text" id="contactSubject" placeholder="Enter subject (5-50 characters)">
<small id="subjectError" style="color:red;"></small>

<label>Message</label>
<textarea id="contactMessage" rows="5" placeholder="Write your message"></textarea>
<small id="messageError" style="color:red;"></small>

<input type="submit" value="Send Message">
<p id="out7" style="color:green;"></p>

</form>
</div>

<div class="box">
<h2>Contact Information</h2>
<p><b>Email:</b> support@mylearninghub.com</p>
<p><b>Phone:</b> +91 98765 43210</p>
<p><b>Address:</b><br>
K. J. Somaiya College of Engineering<br>
Vidyavihar, Mumbai, India
</p>
<hr>
<h3>Our Location</h3>
<div id="map"></div>
</div>

</div>

<footer>© 2026 My Learning Hub</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
function showContact(name = "Guest", subject = "General Query"){
 return name + " sent a message about " + subject;
}

const map = L.map('map').setView([19.0735, 72.8996], 17);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);



L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const svgIcon = L.divIcon({
    className: "custom-marker",
    html: `
    <svg width="40" height="40" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="40"
        fill="rgba(85,107,47,0.25)" />
        <circle cx="50" cy="50" r="25"
        fill="white"
        stroke="darkolivegreen"
        stroke-width="6"/>
        <circle cx="50" cy="50" r="10"
        fill="darkolivegreen"/>

    </svg>
    `,
    iconSize: [40,40],
    iconAnchor: [20,20]
});

L.marker([19.0735, 72.8996], {icon: svgIcon}).addTo(map)
.bindPopup("K. J. Somaiya College of Engineering<br>Vidyavihar, Mumbai")
.openPopup();

let namePattern = /^[A-Za-z ]{3,30}$/;
let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
let phonePattern = /^[0-9]{10}$/;
let subjectPattern = /^[A-Za-z0-9 ]{5,50}$/;

contactName.addEventListener("blur", function(){
    nameError.innerText = namePattern.test(this.value.trim()) ? "" :
    "Name must be letters only (3-30 chars)";
});

contactEmail.addEventListener("blur", function(){
    emailError.innerText = emailPattern.test(this.value.trim()) ? "" :
    "Enter valid email";
});

contactPhone.addEventListener("blur", function(){
    phoneError.innerText = phonePattern.test(this.value.trim()) ? "" :
    "Phone must be 10 digits";
});

contactSubject.addEventListener("blur", function(){
    subjectError.innerText = subjectPattern.test(this.value.trim()) ? "" :
    "Subject must be 5-50 characters (letters & numbers only)";
});

contactMessage.addEventListener("blur", function(){
    messageError.innerText = this.value.trim().length >= 10 ? "" :
    "Message must be at least 10 characters";
});

document.getElementById("contactForm").addEventListener("submit", function(e){
   

    let name = contactName.value.trim();
    let subject = contactSubject.value.trim();
    let message = showContact(name || undefined, subject || undefined);
    document.getElementById("out7").innerText = message;

    let valid =
        namePattern.test(contactName.value.trim()) &&
        emailPattern.test(contactEmail.value.trim()) &&
        phonePattern.test(contactPhone.value.trim()) &&
        subjectPattern.test(contactSubject.value.trim()) &&
        contactMessage.value.trim().length >= 10;

    if(!valid){
        e.preventDefault();
    } else {
        e.preventDefault();
        let contactObj = {
            name: contactName.value,
            email: contactEmail.value,
            phone: contactPhone.value,
            subject: contactSubject.value,
            message: contactMessage.value
        };

       let jsonContact = JSON.stringify(contactObj);

       jsonContact = jsonContact.replace(contactObj.name, contactObj.name.toUpperCase());

       localStorage.setItem("contactData", jsonContact);

       let stored = localStorage.getItem("contactData");

       let parsed = JSON.parse(stored);

       document.getElementById("out7").innerText =
        "Saved: " + parsed.name + " - " + parsed.subject;

        alert("Message Sent Successfully");
        }

});


</script>

</body>
